# ===================================================================
# 1. APPLICATION METADATA
# ===================================================================
spring.application.name=incident-service
server.port=8080

# ===================================================================
# 2. POSTGRESQL DATABASE
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/incident_db
spring.datasource.username=postgres
spring.datasource.password=@Qwerty7

# ===================================================================
# 3. HIKARI CONNECTION POOL (Enterprise Tuned)
# ===================================================================
# Fixed pool design: prevents TCP handshake latency during traffic spikes
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=10

# Fail-fast timeout: 10 seconds (prevents HTTP thread exhaustion)
spring.datasource.hikari.connection-timeout=10000

# Max lifetime: 30 minutes (prevents cloud firewalls from dropping silent connections)
spring.datasource.hikari.max-lifetime=1800000

# ===================================================================
# 4. HIBERNATE / JPA (Local Dev Settings)
# ===================================================================
# Auto-generates the database tables based on your Java Entities
spring.jpa.hibernate.ddl-auto=update

spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# 5. KAFKA PRODUCER CONFIGURATION
# ===================================================================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# ===================================================================
# 6. LOGGING CONFIGURATION
# ===================================================================
# Only show warnings for Kafka (mutes the massive connection logs)
logging.level.org.apache.kafka=WARN
logging.level.org.springframework.kafka=WARN

# Mute Hibernate database connection logs
logging.level.org.hibernate=WARN
spring.jpa.show-sql=false

# Mute Tomcat web server logs
logging.level.org.apache.catalina=WARN
logging.level.org.apache.tomcat=WARN