services:

  # ─── Infrastructure ────────────────────────────────────────────────────────

  kafka:
    image: confluentinc/cp-kafka:7.8.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 15

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka

  postgres:
    image: postgres:17-alpine
    container_name: postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: incident_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "@Qwerty7"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d incident_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c 'echo > /dev/tcp/localhost/6333' || exit 1"]
      interval: 5s
      timeout: 4s
      retries: 10

  # ─── Application Services ──────────────────────────────────────────────────

  incident-service:
    build: ./incident-service
    container_name: incident-service
    ports:
      - "8080:8080"
    environment:
      # Override application.properties to use Docker network hostnames
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/incident_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: "@Qwerty7"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  incident-ai-service:
    build: ./incident-ai-service
    container_name: incident-ai-service
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_INPUT_TOPIC: incident-created
      KAFKA_OUTPUT_TOPIC: incident-analyzed
      KAFKA_CONSUMER_GROUP: incident-ai-group
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      # Ollama runs on the host machine — host.docker.internal resolves to your Windows/Mac host
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      JAVA_SERVICE_URL: http://incident-service:8080
      KNOWLEDGE_BASE_PATH: ./knowledge_base
    depends_on:
      kafka:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      incident-service:
        condition: service_started

  incident-dashboard:
    build: ./incident-dashboard
    container_name: incident-dashboard
    ports:
      - "3000:80"
    depends_on:
      - incident-service
      - incident-ai-service

volumes:
  kafka_data:
  postgres_data:
  qdrant_data:
